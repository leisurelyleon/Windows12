name: ShellHost UI & Frontend CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ui:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet Dependencies
      run: dotnet restore src/UI_Components/

    - name: Build ShellHost UI Components
      run: dotnet build src/UI_Components/ --configuration Release --no-restore

    - name: Execute UI Component Verification Tests
      run: dotnet test src/UI_Components/ --configuration Release --no-build
