name: ShellHost UI & Frontend CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ui:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet Dependencies
      run: dotnet restore src/UI_Components/UI_Components.csproj

    - name: Build ShellHost UI Components
      # Forced x64 platform targeting to satisfy WinUI 3 Self-Contained mode
      run: dotnet build src/UI_Components/UI_Components.csproj --configuration Release -p:Platform=x64 --no-restore

    - name: Execute UI Component Verification Tests
      # Forced x64 platform targeting to match the build output
      run: dotnet test src/UI_Components/UI_Components.csproj --configuration Release -p:Platform=x64 --no-build
